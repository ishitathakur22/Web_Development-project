<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-excercise</title>
    <link rel="stylesheet" href="styles/8.excerise.css">
    <style>
        .name,
        .Email {
            display: block;
            padding: 5px 10px;
            margin-bottom: 5px;
            border: solid;
            border-width: 1px;
            border-radius: 2px;
        }

        .chat {
            width: 300px;
            display: inline-block;
            vertical-align: middle;
        }

        .yes,
        .no {
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 5px;
        }

        .google {
            width: 200px;
            display: block;
            margin-left: 10px;
        }

        .search {
            border-radius: 10px;
            border: none;
            padding: 5px 55px 5px 10px;
            box-shadow: 2px 2px 12px -2px gray;
            margin-bottom: 30px;
            display: block;
        }

        input {
            border-width: 1px;
            border-style: solid;
            border-color: rgb(200, 200, 200);
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 16px;
            padding-right: 16px;
            font-size: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .first {
            width: 148px;
        }

        .sec {
            width: 148px;
        }

        .third {
            display: block;
            width: 340px;
        }

        .up {
            display: block;
            background-color: rgb(240, 240, 240);
            border: none;
            margin-bottom: 10px;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 20px;
            padding-right: 20px;
            font-size: 16px;
            width: 400px;
        }

        .pickup-textbox{
            display: block;
        }

        .destination-textbox {
            display: block;
            margin-bottom: 35px;
        }

        .request-button {
            background-color: black;
            color: white;
            border: none;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 25px;
            padding-right: 25px;
            font-size: 16px;
            margin-right: 20px;
        }

       

        .schedule-button {
            background-color: rgb(240, 240, 240);
            border: none;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 25px;
            padding-right: 25px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <input class="name" type="text" placeholder="Name">
    <input class="Email" type="text" placeholder="Email">
    <p class="chat">
        Thanks for chatting with our customer support.would you like to take oue quick survey?
    </p>
    <button class="yes">
        Yes
    </button>
    <button class="no">
        No
    </button>
    <img class="google" src="/thumbnails/google.png" alt="">
    <input class="search" type="text" placeholder="Search Google ot type a url">

    <input class="first" type="text" placeholder="first-name">
    <input class="sec" type="text" placeholder="Last name">
    <input class="third" "text" placeholder="Email">
    <button class="up">
        Sign up
    </button>
    <input class="pickup-textbox" type="text" placeholder="Enter pickup location">
    <input class="destination-textbox" type="text" placeholder="Enter destination">
    <button class="request-button">Request now</button>
    <button class="schedule-button">Schedule for later</button>
</body>

</html>
