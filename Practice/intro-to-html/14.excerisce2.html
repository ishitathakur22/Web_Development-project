<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>excersice-14</title>
    <style>
        .flexbox {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 50px;
            padding-right: 50px;

        }

        .flexbox1 {
            display: flex;
            align-items: center;
        }
        .image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .images {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
            padding: 10px;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
        }

        .flexbox2 {
            display: flex;
            align-items: center;
        }

        .button1 {
            background-color: rgb(78, 78, 247);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .button1:hover {
            background-color: rgb(42, 42, 229);
            color: rgb(14, 14, 14);
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .button1:active {
            background-color: rgb(67, 67, 229);
            color: rgb(14, 14, 14);
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .button2 {
            background-color: rgb(185, 185, 224);
            color: rgb(14, 14, 14);
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .flexbox3 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            left: 0;
        }
        .flexbox4 {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-right: 20px;
            background-color:rgb(33, 33, 33);
        }
        .flexbox5 {
            display: flex;
            flex-direction: column;
            align-items: right;
            padding-left: 20px;
            height: 222px;
            width: 150px;
            background-color:rgb(55, 55, 55);
        }
        .flexbox6 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            color: rgb(150, 150, 150);
            
        }
        .name1 {
            color: white;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .flexbox6 .name:nth-of-type(1) {
            color: white;
        }
    </style>
</head>

<body style="height: 3000px;
padding-top: 80px;">
    <div class="flexbox">
        <div class="flexbox1">
            <div>
                <img class="image" src="images.jpeg" alt="">
            </div>
            <div>
                <p class="name">oliver cat</p>
            </div>
        </div>
        <div class="flexbox2">
            <div>
                <button class="button1">add friend</button>
            </div>
            <div>
                <button class="button2">message</button>
            </div>
        </div>
    </div>

    <div class="flexbox3">
        <div class="flexbox4">
            <div>
                <img class="images" src="images.jpeg" alt="">
            </div>
            <div>
                <img class="images" src="images.jpeg" alt="">
            </div>
            <div>
                <img class="images" src="images.jpeg" alt="">
            </div>
        </div>
        <div class="flexbox5">
            <div class="flexbox6">
                <div class="name">INFO</div>
                <div class="name1">&#43</div>
            </div>
            <div>
                <p class="name">#new-video</p>
                <p class="name">#updates</p>
                <p class="name">#faq</p>
            </div>

        </div>
    </div>
</body>

</html>
