<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .search{
            border-radius: 5px;
            border-color: gray;
            border-style: solid;
            padding: 5px 10px;
            margin-bottom: 30px;
        }
        .google{
            border-radius: 10px;
            border: none;
            padding: 5px 70px 5px 10px;
            box-shadow: 2px 2px 12px -2px gray; 
            margin-bottom: 30px;
            display: block;
        }
        .email{
            font-family: Arial;
            font-size: 13px;
            color: rgb(97, 95, 95);
            line-height: 5px;
        }
        .text{
            padding: 5px 152px;
            border-radius: 4px;
            border: solid;
            border-width:2px ;
        }
        .agree{
            font-family: Arial;
        }
        .join{
            background-color: rgb(64, 64, 172);
            padding: 8px 152px;
            color: white;
            border-radius: 20px;
            font-size: 22px;
            border: none;
            font-family: Arial;
            display: block;
            margin-bottom: 20px;
        }
       
    
    </style>
</head>
<body>
    <input class="search" type="text" placeholder="search">
</body>

<input class="google" type="text" placeholder="Search Google ot type a url">
<p class="email">
    Email
</p >
<input class="text" type="text">
<p class="agree">
    By clicking agree & Join, you agree to the privcy policy
</p>
<button class="join">
    Agree &#38; Join
</button>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .thumbnail-1 {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 25px;
        vertical-align: middle;
        margin-right: 5px;
      }
      
      .text-box {
        font-size: 18px;
        border: none;
        width: 300px;
        vertical-align: middle;
      }
      
      .tweet-button {
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        vertical-align: middle;
      }
    </style>
</head>
<body>
    <img class="thumbnail-1" src="thumbnail-1.webp" alt="">
    <input type="text" class="text-box" placeholder="What's happening?">
        <button class="tweet-button">
          Tweet
        </button>  
</body>
</html>
