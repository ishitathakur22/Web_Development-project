<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-excersies</title>
    <style>
        .red-square {
            background-color: red;
            width: 300px;
            height: 200px;
        }

        .green-circle {
            border-width: 1px;
            background-color: green;
            border-radius: 50%;
            width: 300px;
            height: 300px;
        }

        .Serivce {
            border-style: solid;
            border-color: rgb(30, 29, 29);
            width: 300px;
            padding-left: 15px;
            padding-bottom: 20px;
            border-width: 1px;
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
        }

        .yes,
        .no {
            background-color: blanchedalmond;
            border-color: saddlebrown;
        }

        .install {
            background-color: rgb(49, 47, 47);
        }

        .music {
            color: white;
            font-weight: bold;
            padding: 10px;
            font-size: large;
        }

        .desktop {
            color: rgb(192, 183, 183);
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            font-size: small;
        }

        .happening {
            box-shadow: 2px 2px 25px gray;
            border-radius: 5px;
            margin-bottom: 50px;
        }

        .cat1 {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 25pc;
            vertical-align: middle;
            margin-right: 5px;
        }

        .tweet {
            background-color: rgb(29, 155, 240);
            color: white;
            border: none;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            vertical-align: middle;

        }

        .what {
            font-size: 18px;
            border: none;
            width: 300px;
            vertical-align: middle;
        }

        .recreate {
            width: 240px;
            height: 350px;
            box-shadow: 2px 2px 25px gray;
            border-radius: 5px;
            display: inline-block;
            margin-left: 20px;
            margin-right: 20px;
        }

        .cat {
            margin: 20px;

            width: 200px;
            height: 200px;
            object-position: center;
        }

        .name {
            font-weight: bold;
            padding-left: 20px;
            line-height: 2%;
        }

        .mutual {
            padding-left: 20px;
        }

        .add {
            background-color: blue;
            color: white;
            margin-left: 20px;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.15s;
        }

        .add:hover {
            background-color: rgb(55, 55, 203);
            cursor: pointer;
        }

        .add:active {
            background-color: rgb(50, 50, 173);
            opacity: 0.7;
        }

        .chrome {
            text-align: center;
            
        }

        .google-logo {
            width: 200px;
            margin-top: 10px;
            margin-bottom: 10px;

        }

        .url {
            display: block;
            margin: 0 auto;  
            border: none;
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 16px;
            padding-right: 16px;
            font-size: 16px;
            width: 500px;
            border-radius: 30px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .google-button {
            background-color: rgb(245, 245, 245);
            border: none;
            font-size: 15px;
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .search-button {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="red-square"></div>
    <div class="green-circle"></div>
    <div class="Serivce">
        <p>Satisfied with the Serivce</p>
        <button class="yes">
            yes
        </button>
        <button class="no">
            no
        </button>
    </div>
    <div class="install">
        <p class="music">
            Install Youtube Music
        </p>
        <P class="desktop">
            Add Youtube Music To your desktop for quick and easy access.
        </P>
    </div>
    <div class="happening">
        <img class="cat1" src="download.jpeg" alt="">
        <input class="what" type="text" placeholder="What is happening">
        <button class="tweet">Tweet</button>

    </div>

    <div class="recreate">
        <img class="cat" src="images (1).jpeg" alt="">
        <p class="name">
            Oliver
        </p>
        <p class="mutual">
            2 mutual friends
        </p>
        <button class="add">
            Add Friends
        </button>

    </div>
    <div class="recreate">
        <img class="cat" src="images.jpeg" alt="">
        <p class="name">
            Oliver
        </p>
        <p class="mutual">
            2 mutual friends
        </p>
        <button class="add">
            Add Friends
        </button>

    </div>
    <div class="recreate">
        <img class="cat" src="download.jpeg" alt="">
        <p class="name">
            Oliver
        </p>
        <p class="mutual">
            2 mutual friends
        </p>
        <button class="add">
            Add Friends
        </button>

    </div>
    <div class="chrome">
        <img class="google-logo" src="google.png">

        <input class="url" type="text" placeholder="Search Google or type a URL">

        <button class="google-button search-button">Google Search</button>
        <button class="google-button">I'm Feeling Lucky</button>
    </div>
</body>

</html>
