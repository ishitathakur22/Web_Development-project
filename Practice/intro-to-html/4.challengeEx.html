<button class="back-button">
    Back
</button>
<a class="search-button" target="_blank" href="https://google.com">1</a>
<a class="search-button" target="_blank" href="https://google.com">2</a>
<a class="search-button" target="_blank" href="https://google.com">3</a>
<a class="search-button" target="_blank" href="https://google.com">4</a>
<a class="search-button" target="_blank" href="https://google.com">5</a>
<button class="next-button">
    Next
</button>

<style>
    .back-button{
        background-color: rgb(243, 237, 230);
        padding: 10px;
        border-radius: 3px;
        border-color: black;
        border-style: solid;
        margin: 4px;
        transition: opacity 0.15s;
    }

    .back-button:hover{
        background-color: antiquewhite;
        cursor: pointer;
        opacity: 0.7px;
    }

    .back-button:active{
        background-color: bisque;
        font-weight: bold;
    }

    .search-button{
        font-size: 20px;
        color: black;
        margin: 4px;
    }
    .next-button{
        background-color: rgb(243, 237, 230);
        padding: 10px;
        border-radius: 3px;
        border-color: black;
        border-style: solid;
        margin: 4px;
        transition: opacity 0.15s;
    }
    .next-button:hover{
        background-color: antiquewhite;
        cursor: pointer;
        opacity: 0.7px;
    }

    .next-button:active{
        background-color: bisque;
        font-weight: bold;
    }
</style>

<p>
<button class="stretch-button">
    Stretch
</button>
</p>

<style>
    .stretch-button{
        background-color: green;
        color: white;
        padding: 5px 10px;
        transition: padding 0.15s;
    }

    .stretch-button:hover{
        padding: 20px 30px ;
        cursor: pointer;
    }
</style>

<p>
    <button class="shadow-button">
        Shadow
    </button>
</p>

<style>
    .shadow-button{
        background-color: green;
        color: white;
        padding: 5px 10px;
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3); 
    }

    .shadow-button:hover{
        cursor: pointer;
        margin: 3px 3px;
        box-shadow: none; 
       
    }
</style>

<button class="number-button">
    One
</button>

<button class="number-button">
    Two
</button>

<button class="number-button">
    Three
</button>

<style>
    .number-button{
        background-color: green;
        color: white;
        margin: 4px;
        padding: 5px 10px;
        border: none;
        cursor: pointer;
        transition: padding 0.15s,
        margin 0.15s;
    }

    .number-button:hover{
        padding: 5px 15px ;
        margin: 0px ;
    }
</style>
