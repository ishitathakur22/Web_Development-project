<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-exercise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        p {
            font-family: Roboto, Arial, sans-serif;
        }
        .main {
            display:flex;
            width: 300px;
            height: 100px;
            vertical-align: top;
        }
        .profile-picture {
            width: 80px;
            display: inline-block;
        }
        .image {
            width: 80px;
            border-radius: 50%;
        }
        .text {
            width: 100px;
            line-height: 20px;
            vertical-align: top; /* Adjusted for better readability */
        }
        .oliver {
            vertical-align: top;
            font-weight: bold;
        }
        .follow {
            width: 60px;
            display: inline;
            background-color: blue;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .button {
            width: 60px;
            display: inline-block;
            margin-top: 10px; /* Added for spacing */
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="profile-picture">
            <img class="image" src="images.jpeg">
        </div>
        <div class="text">
            <p class="oliver">Oliver</p>
            <p>the cat</p>
            <p>popular</p>
        </div>
        <div class="button">
            <button class="follow">Follow</button>
        </div>
    </div>
</body>
</html>
