<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-excercise</title>
    <style>
        .text1 {
            font-size: 20px;
            color: rgb(16, 16, 16);
            display: block;
        }

        .text2 {
            font-size: 15px;
            color: rgb(16, 16, 16);
            display: block;
            margin-top: 5px;
        }

        .button {
            background-color: rgb(225, 207, 13);
            color: rgb(14, 12, 12);
            border-width: 3px;
            border: solid;
            padding: 10px 20px;
            text-align: center;
            font-weight: bold;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
        }

        .button:nth-of-type(2) {
            background-color: orange;
        }
    </style>
</head>

<body>
    <p class="text1">Adult Plan Cotton T-shirt</p>
    <p class="text2">Price : $7.99</p>
    <button class="button" onclick="
        alert('added')">add to cart</button>
    <button class="button" onclick="
        alert('purchase')
        alert('loading...')">buy now</button>

        
    
</body>

</html>
