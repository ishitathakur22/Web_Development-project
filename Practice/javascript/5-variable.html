<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variables</title>
</head>
<body>
    <script>
        let variable1 = 5; // number
        console.log(variable1);// 5

        let calculation = 2+2; // number
        console.log(calculation); // 4
        console.log(calculation + 2); // 6

        let result = calculation + variable1; // number
        console.log(result); // 9   

        let message = 'hello'; // string
        console.log(message); // hello 

        variable1=5;
        console.log(variable1); // 5

        variable1 = variable1 + 1; // number
        console.log(variable1); // 6
    </script>
    
</body>
</html>
