<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login/Registration</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"/>
</head>
<body>
  <header>
    <h2 class="logo">IEEE</h2>
    <nav class="navigation">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
      <button class="login-button">Login</button>
    </nav>
  </header>

  <h1 class="welcome-text">WELCOME TO IEEE MSIT</h1>

  <div class="loginbox">
    <img src="cross-icon.png" alt="Large white X symbol centered on a soft blue gradient background, representing a close or cancel action, with no additional text or elements present, neutral tone" class="close-icon" />

    <div class="popup-box login">
      <h2>Login</h2>
      <form>
        <div class="inside-box">
          <input type="email" required />
          <label>Email</label>
        </div>
        <div class="inside-box">
          <input type="password" required />
          <label>Password</label>
        </div>
        <div class="remember-forgot">
          <label><input type="checkbox" required /> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="button">Login</button>
        <div class="login-register">
          <p>Don't have an account? <a href="#" class="signup-link">Signup</a></p>
        </div>
      </form>
    </div>

    <div class="popup-box signup">
      <h2>Signup</h2>
      <form>
        <div class="inside-box">
          <input type="text" required />
          <label>Username</label>
        </div>
        <div class="inside-box">
          <input type="email" required />
          <label>Email</label>
        </div>
        <div class="inside-box">
          <input type="password" required />
          <label>Password</label>
        </div>
        <div class="remember-forgot">
          <input type="checkbox" required />
          <label>I agree to the terms</label>
        </div>
        <button type="submit" class="button">Register</button>
        <div class="login-register">
          <p>Already have an account? <a href="#" class="login-link">Login</a></p>
        </div>
      </form>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
